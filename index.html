<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Compromissos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;min-height:100vh;transition:background .25s;background:#e8d5b0}
body.dark{background:#1a0f00}
:root{
  --bg:#fff8ee;--bg2:#f5e8cc;--bg3:#eeddb0;
  --text:#3a1f00;--text2:#6b3d0a;--text3:#8C5B30;
  --border:#d9ad77;--border2:#8C5B30;
  --accent:#F28B0C;--accent2:#c47008;
  --today-bg:#F28B0C;--today-text:#fff;
  --sel-bg:#fff3dc;--sel-border:#F28B0C;
  --modal-bg:#fff8ee;--overlay:rgba(58,31,0,0.45);
  --inp:#fff8ee;--inp-b:#d9ad77;
  --btn:#f5e8cc;--btn-h:#eeddb0;
  --ev-work:#F28B0C;--ev-personal:#8C5B30;--ev-health:#732002;--ev-other:#D9AD77;
  --tw-bg:#fff3dc;--tw-t:#c47008;
  --tp-bg:#f5e8cc;--tp-t:#6b3d0a;
  --th-bg:#fde8e0;--th-t:#732002;
  --to-bg:#f0e4cc;--to-t:#8C5B30;
  --up-hd:#F2790F;
  --toast-bg:#3a1f00;--toast-t:#fff8ee;
}
body.dark{
  --bg:#2a1500;--bg2:#1e0e00;--bg3:#3a1f00;
  --text:#f5ddb0;--text2:#d9ad77;--text3:#8C5B30;
  --border:#4a2800;--border2:#732002;
  --accent:#F28B0C;--accent2:#e07a00;
  --today-bg:#F28B0C;--today-text:#1a0800;
  --sel-bg:#3a2000;--sel-border:#F28B0C;
  --modal-bg:#2a1500;--overlay:rgba(0,0,0,0.65);
  --inp:#1e0e00;--inp-b:#4a2800;
  --btn:#3a1f00;--btn-h:#4a2800;
  --ev-work:#F28B0C;--ev-personal:#D9AD77;--ev-health:#F2790F;--ev-other:#8C5B30;
  --tw-bg:#3a2000;--tw-t:#F28B0C;
  --tp-bg:#2e1a00;--tp-t:#D9AD77;
  --th-bg:#2e1000;--th-t:#F2790F;
  --to-bg:#2a1500;--to-t:#8C5B30;
  --up-hd:#F28B0C;
  --toast-bg:#f5ddb0;--toast-t:#3a1f00;
}

#app{max-width:820px;margin:0 auto;padding:1.25rem 1rem}

/* ── topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.nav-g{display:flex;align-items:center;gap:8px}
.nb{background:var(--btn);border:0.5px solid var(--border);border-radius:8px;padding:5px 13px;cursor:pointer;color:var(--text);font-size:15px;transition:background .15s}
.nb:hover{background:var(--btn-h)}
.ml{font-size:18px;font-weight:500;color:var(--text);min-width:165px;text-align:center}
.rb{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.thw{display:flex;align-items:center;gap:6px}
.thl{font-size:12px;color:var(--text3)}
.tg{width:42px;height:23px;background:var(--btn);border:0.5px solid var(--border);border-radius:12px;cursor:pointer;position:relative;transition:background .2s}
.tk{width:17px;height:17px;background:var(--accent);border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s}
.dark .tk{left:22px}

/* ── action bar ── */
.abar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:1.1rem;padding:10px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:10px}
.abar-lbl{font-size:12px;color:var(--text3);margin-right:4px;white-space:nowrap}
.abtn{display:flex;align-items:center;gap:5px;background:var(--btn);border:0.5px solid var(--border);border-radius:7px;padding:6px 13px;cursor:pointer;color:var(--text2);font-size:13px;font-family:inherit;transition:background .15s;white-space:nowrap}
.abtn:hover{background:var(--btn-h)}
.abtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.abtn.primary:hover{background:var(--accent2)}
.abtn svg{width:14px;height:14px;flex-shrink:0}

/* ── calendar ── */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem}
.ch{text-align:center;font-size:11px;color:var(--text3);padding:5px 0;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.cc{min-height:84px;border:0.5px solid var(--border);border-radius:9px;padding:5px;cursor:pointer;background:var(--bg);transition:background .15s,border .15s}
.cc:hover{background:var(--bg2)}
.cc.om{opacity:.25;pointer-events:none}
.cc.it{border:1.5px solid var(--accent)}
.cc.it .dn{background:var(--today-bg);color:var(--today-text);border-radius:50%}
.cc.sl{background:var(--sel-bg);border:1.5px solid var(--sel-border)}
.dn{font-size:12px;font-weight:500;color:var(--text);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.ces{display:flex;flex-direction:column;gap:2px}
.ce{font-size:10px;font-weight:500;border-radius:4px;padding:1px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6}
.ce.work{background:var(--tw-bg);color:var(--tw-t)}
.ce.personal{background:var(--tp-bg);color:var(--tp-t)}
.ce.health{background:var(--th-bg);color:var(--th-t)}
.ce.other{background:var(--to-bg);color:var(--to-t)}
.cm{font-size:10px;color:var(--text3);padding-left:3px}

/* ── upcoming ── */
.up-blk{margin-bottom:1.1rem}
.up-hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.up-dn{font-size:14px;font-weight:500;color:var(--up-hd)}
.up-ds{font-size:12px;color:var(--text3)}
.up-badge{font-size:11px;background:var(--accent);color:#fff;border-radius:4px;padding:1px 8px;font-weight:500;margin-left:2px}
.ecard{display:flex;align-items:stretch;border:0.5px solid var(--border);border-radius:9px;margin-bottom:6px;overflow:hidden;background:var(--bg)}
.estr{width:4px;flex-shrink:0}
.estr.work{background:var(--ev-work)}.estr.personal{background:var(--ev-personal)}.estr.health{background:var(--ev-health)}.estr.other{background:var(--ev-other)}
.ebody{flex:1;padding:8px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.etitle{font-size:14px;font-weight:500;color:var(--text)}
.emeta{font-size:12px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.etag{font-size:10px;border-radius:4px;padding:1px 6px;font-weight:500}
.etag.work{background:var(--tw-bg);color:var(--tw-t)}.etag.personal{background:var(--tp-bg);color:var(--tp-t)}.etag.health{background:var(--th-bg);color:var(--th-t)}.etag.other{background:var(--to-bg);color:var(--to-t)}
.enotes{font-size:12px;color:var(--text3);margin-top:3px}
.eactions{display:flex;align-items:flex-start;gap:2px;flex-shrink:0}
.edel,.eedit{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:3px 5px;line-height:1;align-self:flex-start;border-radius:5px;transition:background .15s,color .15s}
.eedit:hover{color:var(--accent);background:var(--bg2)}
.edel:hover{color:#732002;background:var(--bg2)}
.noev{font-size:12px;color:var(--text3);padding:3px 0 8px}

/* ── modal ── */
.modal-wrap{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:200}
.mbox{background:var(--modal-bg);border-radius:13px;border:0.5px solid var(--border2);padding:1.5rem;width:330px;max-width:95vw}
.mbox h3{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1rem}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:12px;color:var(--text2);margin-bottom:3px}
.fr input,.fr select,.fr textarea{width:100%;background:var(--inp);border:0.5px solid var(--inp-b);border-radius:7px;padding:7px 10px;font-size:14px;color:var(--text);outline:none;font-family:inherit;transition:border .15s}
.fr input:focus,.fr textarea:focus{border-color:var(--accent)}
.fr textarea{height:62px;resize:vertical}
.r2{display:flex;gap:8px}.r2>div{flex:1}
.macts{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.bcan{background:var(--btn);border:0.5px solid var(--border);border-radius:8px;padding:7px 15px;cursor:pointer;color:var(--text2);font-size:13px;font-family:inherit}
.bcan:hover{background:var(--btn-h)}
.bsav{background:var(--accent);border:none;border-radius:8px;padding:7px 15px;cursor:pointer;color:#fff;font-size:13px;font-weight:500;font-family:inherit}
.bsav:hover{background:var(--accent2)}

/* ── toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--toast-bg);color:var(--toast-t);font-size:13px;padding:9px 20px;border-radius:8px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- topbar: navegação + tema -->
  <div class="topbar">
    <div class="nav-g">
      <button class="nb" id="prev">&#8592;</button>
      <span class="ml" id="mlbl"></span>
      <button class="nb" id="next">&#8594;</button>
    </div>
    <div class="rb">
      <div class="thw">
        <span class="thl" id="tlbl">Dia</span>
        <div class="tg" id="tog"><div class="tk"></div></div>
      </div>
    </div>
  </div>

  <!-- barra de ações -->
  <div class="abar">
    <span class="abar-lbl">Ações:</span>
    <span id="file-id" style="font-size:11px;color:var(--text3);background:var(--bg2);border:0.5px solid var(--border);border-radius:5px;padding:3px 8px;margin-right:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="abtn primary" id="btn-new">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
      Novo compromisso
    </button>
    <button class="abtn" id="btn-save-ls">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><rect x="5" y="2" width="6" height="4" rx="1"/><rect x="4" y="8" width="8" height="5" rx="1"/></svg>
      Salvar
    </button>
    <button class="abtn" id="btn-export">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V3M5 7l3 3 3-3"/><path d="M3 12h10"/></svg>
      Exportar .txt
    </button>
    <button class="abtn" id="btn-import-trigger">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 6v7M5 9l3-3 3 3"/><path d="M3 12h10"/></svg>
      Importar .txt
    </button>
    <input type="file" id="file-input" accept=".txt" style="display:none">
  </div>

  <div class="cg" id="cal"></div>
  <div id="upcoming"></div>
</div>

<!-- modal novo/editar compromisso -->
<div class="modal-wrap" id="modal" style="display:none">
  <div class="mbox">
    <h3 id="modal-title">Novo compromisso</h3>
    <input type="hidden" id="f-id">
    <div class="fr"><label>Título</label><input type="text" id="f-title" placeholder="Ex: Reunião com cliente"></div>
    <div class="fr"><label>Data</label><input type="date" id="f-date"></div>
    <div class="fr"><div class="r2"><div><label>Início</label><input type="time" id="f-start"></div><div><label>Fim</label><input type="time" id="f-end"></div></div></div>
    <div class="fr"><label>Categoria</label><select id="f-cat"><option value="work">Trabalho</option><option value="personal">Pessoal</option><option value="health">Saúde</option><option value="other">Outro</option></select></div>
    <div class="fr"><label>Observações</label><textarea id="f-notes" placeholder="Detalhes adicionais..."></textarea></div>
    <div class="macts"><button class="bcan" id="btn-cancel">Cancelar</button><button class="bsav" id="btn-save">Salvar</button></div>
  </div>
</div>

<!-- toast de feedback -->
<div id="toast"></div>

<script>
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DF=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const CL={work:'Trabalho',personal:'Pessoal',health:'Saúde',other:'Outro'};

let today=new Date();
let cur={y:today.getFullYear(),m:today.getMonth()};
let sel={y:today.getFullYear(),m:today.getMonth(),d:today.getDate()};
let events=[];

/* ── chave única por arquivo ── */
const STORAGE_KEY='agenda::'+decodeURIComponent(location.pathname.split('/').pop().replace(/\.html?$/i,'')).trim();
try{events=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){}
let dark=false;

/* ── persistência ── */
function saveLS(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(events));return true}
  catch(e){return false}
}
function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function evFor(y,m,d){return events.filter(e=>e.date===dk(y,m,d))}

/* ── toast ── */
let toastTimer=null;
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=ok?'var(--toast-bg)':'#732002';
  t.style.color=ok?'var(--toast-t)':'#fff';
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── tema ── */
function applyTheme(){
  dark?document.body.classList.add('dark'):document.body.classList.remove('dark');
  document.getElementById('tlbl').textContent=dark?'Noite':'Dia';
  document.querySelector('.tk').style.left=dark?'22px':'3px';
}
document.getElementById('tog').onclick=()=>{dark=!dark;applyTheme()};

/* ── exportar TXT ── */
function exportTxt(){
  if(!events.length){toast('Nenhum compromisso para exportar.',false);return}
  const sorted=[...events].sort((a,b)=>a.date.localeCompare(b.date)||(a.start||'').localeCompare(b.start||''));
  let txt='AGENDA DE COMPROMISSOS\n';
  txt+='Exportado em: '+new Date().toLocaleString('pt-BR')+'\n';
  txt+='='.repeat(40)+'\n\n';
  let lastDate='';
  sorted.forEach(e=>{
    if(e.date!==lastDate){
      const [y,m,d]=e.date.split('-');
      const dt=new Date(+y,+m-1,+d);
      txt+=`\n📅 ${DF[dt.getDay()]}, ${+d} de ${MONTHS[+m-1]} de ${y}\n`;
      txt+='-'.repeat(36)+'\n';
      lastDate=e.date;
    }
    txt+=`  • ${e.title}\n`;
    if(e.start) txt+=`    Horário: ${e.start}${e.end?' – '+e.end:''}\n`;
    txt+=`    Categoria: ${CL[e.cat]||e.cat}\n`;
    if(e.notes) txt+=`    Obs: ${e.notes}\n`;
  });
  txt+='\n'+'='.repeat(40)+'\n';
  txt+=`Total: ${events.length} compromisso(s)\n`;
  const suggestedName=decodeURIComponent(location.pathname.split('/').pop()||'agenda_compromissos.html').replace(/\.html?$/i,'.txt');
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=suggestedName;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exportado como: '+suggestedName);
}

/* ── importar TXT ── */
function importTxt(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const txt=e.target.result;
    const lines=txt.split('\n');
    const imported=[];
    let currentDate='';
    let i=0;
    while(i<lines.length){
      const line=lines[i].trim();
      // detecta linha de data: "📅 Dia, D de Mês de AAAA"
      const dateMatch=line.match(/(\d{1,2}) de (\w+) de (\d{4})/);
      if(dateMatch){
        const d=dateMatch[1].padStart(2,'0');
        const mName=dateMatch[2];
        const y=dateMatch[3];
        const mIdx=MONTHS.indexOf(mName);
        if(mIdx>=0) currentDate=`${y}-${String(mIdx+1).padStart(2,'0')}-${d}`;
      }
      // detecta evento: "  • Título"
      if(line.startsWith('•')&&currentDate){
        const title=line.replace(/^•\s*/,'').trim();
        if(title){
          const ev={id:Date.now()+imported.length,title,date:currentDate,start:'',end:'',cat:'other',notes:''};
          // horário
          if(i+1<lines.length){
            const hm=lines[i+1].match(/Horário:\s*(\d{2}:\d{2})(?:\s*–\s*(\d{2}:\d{2}))?/);
            if(hm){ev.start=hm[1];if(hm[2])ev.end=hm[2];i++;}
          }
          // categoria
          if(i+1<lines.length){
            const cm=lines[i+1].match(/Categoria:\s*(.+)/);
            if(cm){
              const catMap={'Trabalho':'work','Pessoal':'personal','Saúde':'health','Outro':'other'};
              ev.cat=catMap[cm[1].trim()]||'other';i++;
            }
          }
          // obs
          if(i+1<lines.length){
            const om=lines[i+1].match(/Obs:\s*(.+)/);
            if(om){ev.notes=om[1].trim();i++;}
          }
          imported.push(ev);
        }
      }
      i++;
    }
    if(!imported.length){toast('Nenhum compromisso encontrado no arquivo.',false);return}
    // merge: evita duplicatas por título+data+hora
    let added=0;
    imported.forEach(imp=>{
      const dup=events.find(ex=>ex.title===imp.title&&ex.date===imp.date&&ex.start===imp.start);
      if(!dup){events.push(imp);added++;}
    });
    saveLS();
    renderCal();renderUpcoming();
    toast(`${added} compromisso(s) importado(s) com sucesso!`);
  };
  reader.readAsText(file,'utf-8');
}

document.getElementById('btn-import-trigger').onclick=()=>document.getElementById('file-input').click();
document.getElementById('file-input').onchange=e=>{
  const f=e.target.files[0];
  if(f) importTxt(f);
  e.target.value='';
};

/* ── salvar manualmente ── */
document.getElementById('btn-save-ls').onclick=()=>{
  const ok=saveLS();
  toast(ok?`${events.length} compromisso(s) salvo(s) com sucesso!`:'Erro ao salvar. Armazenamento pode estar cheio.',ok);
};

/* ── exportar ── */
document.getElementById('btn-export').onclick=exportTxt;

/* ── calendário ── */
function renderCal(){
  document.getElementById('mlbl').textContent=`${MONTHS[cur.m]} ${cur.y}`;
  const cal=document.getElementById('cal');
  cal.innerHTML=DS.map(d=>`<div class="ch">${d}</div>`).join('');
  const first=new Date(cur.y,cur.m,1).getDay();
  const dim=new Date(cur.y,cur.m+1,0).getDate();
  const pd=new Date(cur.y,cur.m,0).getDate();
  let cells=[];
  for(let i=first-1;i>=0;i--) cells.push({d:pd-i,m:cur.m===0?11:cur.m-1,y:cur.m===0?cur.y-1:cur.y,o:true});
  for(let d=1;d<=dim;d++) cells.push({d,m:cur.m,y:cur.y,o:false});
  let rem=42-cells.length;
  for(let d=1;d<=rem;d++) cells.push({d,m:cur.m===11?0:cur.m+1,y:cur.m===11?cur.y+1:cur.y,o:true});
  cells.forEach(c=>{
    const ev=evFor(c.y,c.m,c.d);
    const iT=!c.o&&c.y===today.getFullYear()&&c.m===today.getMonth()&&c.d===today.getDate();
    const iS=!c.o&&c.y===sel.y&&c.m===sel.m&&c.d===sel.d;
    const cell=document.createElement('div');
    cell.className='cc'+(c.o?' om':'')+(iT?' it':'')+(iS?' sl':'');
    const vis=ev.slice(0,2);
    const more=ev.length>2?`<div class="cm">+${ev.length-2} mais</div>`:'';
    cell.innerHTML=`<div class="dn">${c.d}</div><div class="ces">${vis.map(e=>`<div class="ce ${e.cat}" title="${e.title}">${e.start?e.start+' ':''}${e.title}</div>`).join('')}${more}</div>`;
    if(!c.o) cell.onclick=()=>{sel={y:c.y,m:c.m,d:c.d};renderCal();renderUpcoming()};
    cal.appendChild(cell);
  });
}

/* ── compromissos do dia selecionado até o fim do mês ── */
function renderUpcoming(){
  const up=document.getElementById('upcoming');
  const lastDay=new Date(sel.y,sel.m+1,0).getDate();
  let html='';let hasAny=false;
  for(let d=sel.d;d<=lastDay;d++){
    const evs=evFor(sel.y,sel.m,d).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    if(d>sel.d&&evs.length===0) continue;
    hasAny=true;
    const iT=sel.y===today.getFullYear()&&sel.m===today.getMonth()&&d===today.getDate();
    const iS=d===sel.d;
    const dow=new Date(sel.y,sel.m,d).getDay();
    const dayName=iT?'Hoje':DF[dow];
    const dateFmt=`${d} de ${MONTHS[sel.m]}${sel.y!==today.getFullYear()?' de '+sel.y:''}`;
    const badge=iT?'<span class="up-badge">Hoje</span>':iS?'<span class="up-badge">Selecionado</span>':'';
    const evHtml=evs.length===0
      ?`<div class="noev">Sem compromissos neste dia</div>`
      :evs.map(e=>`<div class="ecard"><div class="estr ${e.cat}"></div><div class="ebody"><div><div class="etitle">${e.title}</div><div class="emeta">${e.start?`<span>${e.start}${e.end?' – '+e.end:''}</span>`:''}<span class="etag ${e.cat}">${CL[e.cat]}</span></div>${e.notes?`<div class="enotes">${e.notes}</div>`:''}</div><div class="eactions"><button class="eedit" data-id="${e.id}" title="Editar"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 2l3 3-8 8H3v-3l8-8z"/></svg></button><button class="edel" data-id="${e.id}" title="Excluir">×</button></div></div></div>`).join('');
    html+=`<div class="up-blk"><div class="up-hdr"><span class="up-dn">${dayName}</span><span class="up-ds">${dateFmt}</span>${badge}</div>${evHtml}</div>`;
  }
  if(!hasAny) html=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:20px 0">Nenhum compromisso de ${sel.d} de ${MONTHS[sel.m]} até o fim do mês</div>`;
  up.innerHTML=html;
  up.querySelectorAll('.edel').forEach(b=>{
    b.onclick=()=>{events=events.filter(e=>String(e.id)!==String(b.dataset.id));saveLS();renderCal();renderUpcoming();toast('Compromisso removido.')};
  });
  up.querySelectorAll('.eedit').forEach(b=>{
    b.onclick=()=>{const ev=events.find(e=>String(e.id)===String(b.dataset.id));if(ev)openModal(ev)};
  });
}

/* ── modal ── */
function openModal(ev){
  const isEdit=!!ev;
  document.getElementById('modal-title').textContent=isEdit?'Editar compromisso':'Novo compromisso';
  document.getElementById('btn-save').textContent=isEdit?'Atualizar':'Salvar';
  document.getElementById('f-id').value=isEdit?ev.id:'';
  if(isEdit){
    document.getElementById('f-date').value=ev.date;
    document.getElementById('f-title').value=ev.title;
    document.getElementById('f-start').value=ev.start||'';
    document.getElementById('f-end').value=ev.end||'';
    document.getElementById('f-cat').value=ev.cat||'work';
    document.getElementById('f-notes').value=ev.notes||'';
  } else {
    const d=String(sel.d).padStart(2,'0'),m=String(sel.m+1).padStart(2,'0');
    document.getElementById('f-date').value=`${sel.y}-${m}-${d}`;
    ['f-title','f-start','f-end','f-notes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-cat').value='work';
  }
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}
document.getElementById('btn-new').onclick=()=>openModal();
document.getElementById('btn-cancel').onclick=()=>document.getElementById('modal').style.display='none';
const modalEl=document.getElementById('modal');
let mouseDownOnOverlay=false;
modalEl.addEventListener('mousedown',e=>{mouseDownOnOverlay=e.target===modalEl});
modalEl.addEventListener('mouseup',e=>{if(mouseDownOnOverlay&&e.target===modalEl)modalEl.style.display='none';mouseDownOnOverlay=false});
document.getElementById('prev').onclick=()=>{cur.m--;if(cur.m<0){cur.m=11;cur.y--}renderCal()};
document.getElementById('next').onclick=()=>{cur.m++;if(cur.m>11){cur.m=0;cur.y++}renderCal()};
document.getElementById('btn-save').onclick=()=>{
  const title=document.getElementById('f-title').value.trim();
  if(!title)return;
  const editId=document.getElementById('f-id').value;
  const data={title,date:document.getElementById('f-date').value,start:document.getElementById('f-start').value,end:document.getElementById('f-end').value,cat:document.getElementById('f-cat').value,notes:document.getElementById('f-notes').value.trim()};
  if(editId){
    const idx=events.findIndex(e=>String(e.id)===String(editId));
    if(idx>=0) events[idx]={...events[idx],...data};
    toast('Compromisso atualizado!');
  } else {
    events.push({id:Date.now(),...data});
    toast('Compromisso salvo!');
  }
  saveLS();
  document.getElementById('modal').style.display='none';
  const p=data.date.split('-');
  sel={y:+p[0],m:+p[1]-1,d:+p[2]};cur={y:sel.y,m:sel.m};
  renderCal();renderUpcoming();
};

const _fn=decodeURIComponent(location.pathname.split('/').pop()||'agenda_tema_dia_noite.html');
const _fi=document.getElementById('file-id');
if(_fi){_fi.textContent='📄 '+_fn;_fi.title='Armazenamento: '+STORAGE_KEY;}
renderCal();renderUpcoming();
</script>
</body>
